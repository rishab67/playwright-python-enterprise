name: Enterprise CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  test-execution:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Download Codebase
      uses: actions/checkout@v4

    - name: 🐍 Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 📦 Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium

    - name: 🚀 Execute Parallel Test Engine
      env:
        API_BASE_URL: ${{ secrets.API_BASE_URL }}
        UI_BASE_URL: ${{ secrets.UI_BASE_URL }}
        ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
        ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      run: |
        pytest tests/ -n auto --html=report.html --self-contained-html

    - name: 📊 Upload Executive Dashboard
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Enterprise-Test-Report
        path: report.html